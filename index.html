<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Inventario">
    <title>Inventario Furgone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f1419;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        header {
            padding: 16px;
            background: #0a0a0a;
            border-bottom: 1px solid #1e2532;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            display: none;
        }

        .back-btn.visible {
            display: block;
        }

        h1 {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin: 0;
        }

        .save-status {
            font-size: 12px;
            font-weight: bold;
            color: #4a9eff;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-status.show {
            opacity: 1;
        }

        main {
            padding: 16px;
            padding-bottom: 40px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Dashboard */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
        }

        .stat-card:nth-child(1) .stat-number { color: #4a9eff; }
        .stat-card:nth-child(2) .stat-number { color: #ffa500; }
        .stat-card:nth-child(3) .stat-number { color: #00d084; }

        .alert-card {
            background: #2d2416;
            border: 1px solid #ffa500;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .alert-card:active {
            background: #3d3220;
        }

        .alert-title {
            font-size: 14px;
            font-weight: bold;
            color: #ffa500;
        }

        .alert-count {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Inputs e Buttons */
        input {
            width: 100%;
            padding: 10px;
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 8px;
            font-family: inherit;
        }

        button {
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            width: 100%;
            background: #4a9eff;
            color: #fff;
            margin-bottom: 16px;
        }

        .btn-primary:active {
            opacity: 0.8;
        }

        .btn-add {
            width: 50px;
            height: 50px;
            background: #4a9eff;
            color: #fff;
            border-radius: 50%;
            padding: 0;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .btn-delete {
            background: #cc2211;
            color: #fff;
            padding: 6px 10px;
            font-size: 12px;
        }

        .btn-edit {
            background: #4a9eff;
            color: #fff;
            padding: 6px 10px;
            font-size: 12px;
            margin-right: 4px;
        }

        .btn-secondary {
            background: #333;
            color: #e0e0e0;
            width: 100%;
            margin-bottom: 8px;
        }

        /* Lista Items */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .item:active {
            background: #252d3a;
        }

        .item-clickable {
            flex: 1;
            cursor: pointer;
        }

        .item-content {
            flex: 1;
        }

        .item-name {
            color: #e0e0e0;
            font-weight: bold;
            font-size: 14px;
        }

        .item-count {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .item-actions {
            display: flex;
            gap: 4px;
        }

        /* Prodotti */
        .product-card {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .product-card.low-stock {
            border-color: #ffa500;
            background: #2d2416;
        }

        .product-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            color: #e0e0e0;
            font-weight: bold;
            cursor: pointer;
        }

        .product-name:active {
            opacity: 0.7;
        }

        .product-warning {
            font-size: 12px;
            color: #ffa500;
            margin-top: 4px;
            font-weight: bold;
        }

        .product-min-stock {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            cursor: pointer;
        }

        .product-min-stock:active {
            opacity: 0.7;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .qty-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn-minus {
            background: #ff4444;
        }

        .qty-btn-plus {
            background: #00d084;
        }

        .qty-display {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            min-width: 50px;
            text-align: center;
        }

        .breadcrumb {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 20px;
            max-width: 300px;
            width: 90%;
        }

        .modal-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #fff;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
            margin: 0;
        }

        .btn-confirm {
            background: #00d084;
            color: #000;
        }

        .btn-cancel {
            background: #333;
            color: #e0e0e0;
        }

        /* Registro Eventi */
        .event-item {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .event-item.event-plus {
            border-color: #00d084;
            background: #1a2d1f;
        }

        .event-item.event-minus {
            border-color: #ff4444;
            background: #2d1a1a;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .event-product {
            color: #e0e0e0;
            font-weight: bold;
            font-size: 14px;
        }

        .event-time {
            font-size: 12px;
            color: #888;
        }

        .event-details {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        .event-section {
            color: #4a9eff;
        }

        .event-operation {
            font-weight: bold;
        }

        .event-operation.plus {
            color: #00d084;
        }

        .event-operation.minus {
            color: #ff4444;
        }

        .event-low-stock {
            border-color: #ffa500;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <button class="back-btn" id="backBtn">←</button>
            <h1>Inventario Furgone</h1>
        </div>
        <div class="save-status" id="saveStatus">✅ Salvato</div>
    </header>

    <main>
        <!-- DASHBOARD -->
        <div id="dashboardView" class="view active">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalColls">2</div>
                    <div class="stat-label">Raccolte</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSects">3</div>
                    <div class="stat-label">Sezioni</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalProds">6</div>
                    <div class="stat-label">Materiali</div>
                </div>
            </div>

            <div id="alertContainer"></div>

            <button class="btn-primary" id="manageBtn">Gestisci Inventario</button>
            <button class="btn-primary" id="registroBtn" style="background: #666;">Registro Eventi</button>
            <button class="btn-primary" id="backupBtn" style="background: #555;">💾 Scarica Backup</button>
            <button class="btn-primary" id="uploadBtn" style="background: #444;">📤 Carica Backup</button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>

        <!-- COLLECTIONS -->
        <div id="collectionsView" class="view">
            <div class="breadcrumb">Le tue raccolte</div>
            <button class="btn-add" id="addCollBtn">+</button>
            <div class="items-list" id="collectionsList"></div>
        </div>

        <!-- ADD/EDIT COLLECTION -->
        <div id="collectionFormView" class="view">
            <div class="breadcrumb" id="collFormTitle">Nuova raccolta</div>
            <input type="text" id="collFormInput" placeholder="Nome raccolta">
            <button class="btn-primary" id="collFormSubmit">Salva</button>
            <button class="btn-secondary" id="collFormCancel">Annulla</button>
        </div>

        <!-- SECTIONS -->
        <div id="sectionsView" class="view">
            <div class="breadcrumb" id="sectBreadcrumb"></div>
            <button class="btn-add" id="addSectBtn">+</button>
            <div class="items-list" id="sectionsList"></div>
        </div>

        <!-- ADD/EDIT SECTION -->
        <div id="sectionFormView" class="view">
            <div class="breadcrumb" id="sectFormTitle">Nuova sezione</div>
            <input type="text" id="sectFormInput" placeholder="Nome sezione">
            <button class="btn-primary" id="sectFormSubmit">Salva</button>
            <button class="btn-secondary" id="sectFormCancel">Annulla</button>
        </div>

        <!-- PRODUCTS -->
        <div id="productsView" class="view">
            <div class="breadcrumb" id="prodBreadcrumb"></div>
            <button class="btn-add" id="addProdBtn">+</button>
            <div id="productsList"></div>
        </div>

        <!-- ADD/EDIT PRODUCT -->
        <div id="productFormView" class="view">
            <div class="breadcrumb" id="prodFormTitle">Nuovo prodotto</div>
            <input type="text" id="prodFormName" placeholder="Nome prodotto">
            <input type="number" id="prodFormQty" placeholder="Quantità">
            <input type="number" id="prodFormMinStock" placeholder="Soglia minima">
            <button class="btn-primary" id="prodFormSubmit">Salva</button>
            <button class="btn-secondary" id="prodFormCancel">Annulla</button>
        </div>

        <!-- EDIT PRODUCT INFO -->
        <div id="editProductView" class="view">
            <div class="breadcrumb">Modifica prodotto</div>
            <input type="text" id="editProdName" placeholder="Nome prodotto">
            <input type="number" id="editProdMinStock" placeholder="Soglia minima">
            <button class="btn-primary" id="editProdSubmit">Salva</button>
            <button class="btn-secondary" id="editProdCancel">Annulla</button>
        </div>

        <!-- PRODOTTI ESAURITI -->
        <div id="lowStockView" class="view">
            <div class="breadcrumb">Prodotti quasi esauriti</div>
            <div id="lowStockList"></div>
        </div>

        <!-- REGISTRO EVENTI -->
        <div id="registroView" class="view">
            <div class="breadcrumb">Registro Eventi</div>
            <div id="eventsList"></div>
        </div>
    </main>

    <!-- MODAL CONFERMA -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="confirmMessage"></div>
            <div class="modal-buttons">
                <button class="btn-confirm" id="confirmYes">Sì</button>
                <button class="btn-cancel" id="confirmNo">No</button>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = 'InventoryDB';
        const STORE_NAME = 'collections';
        const EVENTS_STORE = 'events';

        let db = null;
        let collections = [];
        let events = [];
        let selectedCollectionId = null;
        let selectedSectionId = null;
        let editingProductId = null;
        let editingCollectionId = null;
        let editingSectionId = null;
        let saveTimeout = null;
        let confirmCallback = null;

        function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 3);

                request.onsuccess = () => {
                    db = request.result;
                    loadData();
                    resolve();
                };

                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains(EVENTS_STORE)) {
                        database.createObjectStore(EVENTS_STORE, { keyPath: 'id' });
                    }
                };

                request.onerror = () => {
                    console.error('Errore apertura DB:', request.error);
                    resolve();
                };
            });
        }

        function loadData() {
            try {
                const transaction = db.transaction([STORE_NAME, EVENTS_STORE], 'readonly');
                const collStore = transaction.objectStore(STORE_NAME);
                const eventsStore = transaction.objectStore(EVENTS_STORE);
                
                const collRequest = collStore.getAll();
                const eventsRequest = eventsStore.getAll();

                collRequest.onsuccess = () => {
                    if (collRequest.result && collRequest.result.length > 0) {
                        collections = collRequest.result;
                    } else {
                        initCollections();
                    }
                    updateStats();
                    renderCollections();
                };

                eventsRequest.onsuccess = () => {
                    events = eventsRequest.result || [];
                };
            } catch (e) {
                console.error('Errore caricamento:', e);
                initCollections();
                updateStats();
                renderCollections();
            }
        }

        function initCollections() {
            collections = [
                { id: 1, name: 'Materiale Ksenia', sections: [] },
                {
                    id: 2,
                    name: 'Raccordi, Scatole, Tubi',
                    sections: [
                        { id: 101, name: 'Canale', products: [
                            { id: 1001, name: 'Canale 20x20', quantity: 2, minStock: 1 },
                            { id: 1002, name: 'Canale 20x30', quantity: 5, minStock: 2 }
                        ]},
                        { id: 102, name: 'Tubi', products: [
                            { id: 1003, name: 'Tubo 16mm', quantity: 2, minStock: 1 }
                        ]},
                        { id: 103, name: 'Scatole', products: [
                            { id: 1004, name: 'Scatola 10x10', quantity: 2, minStock: 2 },
                            { id: 1005, name: 'Scatola 10x15', quantity: 2, minStock: 1 },
                            { id: 1006, name: 'Scatola Rotonda ø80', quantity: 2, minStock: 1 }
                        ]}
                    ]
                }
            ];
            saveData();
        }

        function saveData() {
            if (!db) return;
            
            try {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                
                const statusEl = document.getElementById('saveStatus');
                statusEl.textContent = '✅ Salvato';
                statusEl.classList.add('show');
                
                store.clear();
                collections.forEach(coll => store.put(coll));

                transaction.oncomplete = () => {
                    if (saveTimeout) clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                        statusEl.classList.remove('show');
                    }, 1000);
                };

                transaction.onerror = () => {
                    console.error('Errore salvataggio:', transaction.error);
                };
            } catch (e) {
                console.error('Errore salvataggio:', e);
            }
        }

        function logEvent(productName, sectionName, operation, quantity, isLowStock = false) {
            const now = new Date();
            const date = now.toLocaleDateString('it-IT');
            const time = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

            const event = {
                id: Date.now(),
                productName,
                sectionName,
                operation,
                quantity,
                date,
                time,
                isLowStock,
                timestamp: now.getTime()
            };

            events.unshift(event);
            saveEvent(event);
        }

        function saveEvent(event) {
            if (!db) return;
            
            try {
                const transaction = db.transaction([EVENTS_STORE], 'readwrite');
                const store = transaction.objectStore(EVENTS_STORE);
                store.put(event);
            } catch (e) {
                console.error('Errore salvataggio evento:', e);
            }
        }

        function showConfirm(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('show');
            confirmCallback = callback;
        }

        function hideConfirm() {
            document.getElementById('confirmModal').classList.remove('show');
            confirmCallback = null;
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('backBtn').classList.toggle('visible', viewId !== 'dashboardView');
        }

        function updateStats() {
            const colls = collections.length;
            const sects = collections.reduce((s, c) => s + c.sections.length, 0);
            const prods = collections.reduce((s, c) => s + c.sections.reduce((ss, sec) => ss + sec.products.length, 0), 0);
            
            document.getElementById('totalColls').textContent = colls;
            document.getElementById('totalSects').textContent = sects;
            document.getElementById('totalProds').textContent = prods;

            renderAlert();
        }

        function renderAlert() {
            const lowStockProducts = [];
            collections.forEach(coll => {
                coll.sections.forEach(sect => {
                    sect.products.forEach(prod => {
                        if (prod.quantity <= prod.minStock) {
                            lowStockProducts.push({ ...prod, sectionName: sect.name, collectionName: coll.name });
                        }
                    });
                });
            });

            const container = document.getElementById('alertContainer');
            if (lowStockProducts.length > 0) {
                container.innerHTML = `
                    <div class="alert-card" onclick="showLowStock()">
                        <div class="alert-title">⚠️ ${lowStockProducts.length} prodotto${lowStockProducts.length > 1 ? 'i' : ''} quasi esaurito${lowStockProducts.length > 1 ? 'i' : ''}</div>
                        <div class="alert-count">Clicca per visualizzare</div>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        function showLowStock() {
            const lowStockProducts = [];
            collections.forEach(coll => {
                coll.sections.forEach(sect => {
                    sect.products.forEach(prod => {
                        if (prod.quantity <= prod.minStock) {
                            lowStockProducts.push({ ...prod, sectionName: sect.name, collectionName: coll.name });
                        }
                    });
                });
            });

            const list = document.getElementById('lowStockList');
            list.innerHTML = lowStockProducts.map(prod => `
                <div class="product-card low-stock">
                    <div style="margin-bottom: 8px;">
                        <div style="font-weight: bold; color: #e0e0e0;">${prod.name}</div>
                        <div style="font-size: 12px; color: #888; margin-top: 4px;">${prod.collectionName} › ${prod.sectionName}</div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #0a0a0a; border-radius: 4px;">
                        <div>
                            <div style="font-size: 12px; color: #888;">Quantità: <strong style="color: #ffa500;">${prod.quantity}</strong></div>
                            <div style="font-size: 12px; color: #888; margin-top: 2px;">Soglia: <strong>${prod.minStock}</strong></div>
                        </div>
                    </div>
                </div>
            `).join('');

            showView('lowStockView');
        }

        function renderCollections() {
            const list = document.getElementById('collectionsList');
            list.innerHTML = collections.map(coll => `
                <div class="item">
                    <div class="item-clickable" onclick="selectCollection(${coll.id})">
                        <div class="item-content">
                            <div class="item-name">${coll.name}</div>
                            <div class="item-count">${coll.sections.length} sezioni</div>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="startEditCollection(${coll.id}); event.stopPropagation();">✏️</button>
                        <button class="btn-delete" onclick="deleteCollectionConfirm(${coll.id}); event.stopPropagation();">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function renderSections(collId) {
            const coll = collections.find(c => c.id === collId);
            const list = document.getElementById('sectionsList');
            document.getElementById('sectBreadcrumb').textContent = coll.name;
            
            list.innerHTML = coll.sections.map(sect => `
                <div class="item">
                    <div class="item-clickable" onclick="selectSection(${collId}, ${sect.id})">
                        <div class="item-content">
                            <div class="item-name">${sect.name}</div>
                            <div class="item-count">${sect.products.length} prodotti</div>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="startEditSection(${collId}, ${sect.id}); event.stopPropagation();">✏️</button>
                        <button class="btn-delete" onclick="deleteSectionConfirm(${collId}, ${sect.id}); event.stopPropagation();">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function renderProducts(collId, sectId) {
            const coll = collections.find(c => c.id === collId);
            const sect = coll.sections.find(s => s.id === sectId);
            
            document.getElementById('prodBreadcrumb').textContent = coll.name + ' › ' + sect.name;
            document.getElementById('productsList').innerHTML = sect.products.map(prod => {
                const isLowStock = prod.quantity <= prod.minStock;
                return `
                    <div class="product-card ${isLowStock ? 'low-stock' : ''}">
                        <div class="product-header">
                            <div class="product-info">
                                <div class="product-name" onclick="startEditProduct(${collId}, ${sectId}, ${prod.id}); event.stopPropagation();">${prod.name}</div>
                                ${isLowStock ? `<div class="product-warning">⚠️ Quasi esaurito!</div>` : ''}
                                <div class="product-min-stock" onclick="startEditProduct(${collId}, ${sectId}, ${prod.id}); event.stopPropagation();">Soglia: ${prod.minStock}</div>
                            </div>
                            <button class="btn-delete" onclick="deleteProductConfirm(${collId}, ${sectId}, ${prod.id})">✕</button>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn qty-btn-minus" onclick="decreaseQty(${collId}, ${sectId}, ${prod.id}, '${sect.name}')">−</button>
                            <div class="qty-display">${prod.quantity}</div>
                            <button class="qty-btn qty-btn-plus" onclick="increaseQty(${collId}, ${sectId}, ${prod.id}, '${sect.name}')">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function startAddCollection() {
            editingCollectionId = null;
            document.getElementById('collFormTitle').textContent = 'Nuova raccolta';
            document.getElementById('collFormInput').value = '';
            showView('collectionFormView');
            document.getElementById('collFormInput').focus();
        }

        function startEditCollection(id) {
            const coll = collections.find(c => c.id === id);
            editingCollectionId = id;
            document.getElementById('collFormTitle').textContent = 'Modifica raccolta';
            document.getElementById('collFormInput').value = coll.name;
            showView('collectionFormView');
            document.getElementById('collFormInput').focus();
        }

        function saveCollection() {
            const name = document.getElementById('collFormInput').value.trim();
            if (!name) return;
            
            if (editingCollectionId) {
                const coll = collections.find(c => c.id === editingCollectionId);
                coll.name = name;
            } else {
                collections.push({ id: Date.now(), name, sections: [] });
            }
            
            updateStats();
            renderCollections();
            saveData();
            showView('collectionsView');
        }

        function deleteCollectionConfirm(id) {
            showConfirm('Eliminare questa raccolta?', () => {
                collections = collections.filter(c => c.id !== id);
                updateStats();
                renderCollections();
                saveData();
                hideConfirm();
            });
        }

        function selectCollection(id) {
            selectedCollectionId = id;
            renderSections(id);
            showView('sectionsView');
        }

        function startAddSection() {
            editingSectionId = null;
            document.getElementById('sectFormTitle').textContent = 'Nuova sezione';
            document.getElementById('sectFormInput').value = '';
            showView('sectionFormView');
            document.getElementById('sectFormInput').focus();
        }

        function startEditSection(collId, sectId) {
            const coll = collections.find(c => c.id === collId);
            const sect = coll.sections.find(s => s.id === sectId);
            editingSectionId = sectId;
            document.getElementById('sectFormTitle').textContent = 'Modifica sezione';
            document.getElementById('sectFormInput').value = sect.name;
            showView('sectionFormView');
            document.getElementById('sectFormInput').focus();
        }

        function saveSection() {
            const name = document.getElementById('sectFormInput').value.trim();
            if (!name) return;
            
            const coll = collections.find(c => c.id === selectedCollectionId);
            
            if (editingSectionId) {
                const sect = coll.sections.find(s => s.id === editingSectionId);
                sect.name = name;
            } else {
                coll.sections.push({ id: Date.now(), name, products: [] });
            }
            
            renderSections(selectedCollectionId);
            saveData();
            showView('sectionsView');
        }

        function deleteSectionConfirm(collId, sectId) {
            showConfirm('Eliminare questa sezione?', () => {
                const coll = collections.find(c => c.id === collId);
                coll.sections = coll.sections.filter(s => s.id !== sectId);
                renderSections(collId);
                saveData();
                hideConfirm();
            });
        }

        function selectSection(collId, sectId) {
            selectedCollectionId = collId;
            selectedSectionId = sectId;
            renderProducts(collId, sectId);
            showView('productsView');
        }

        function startAddProduct() {
            editingProductId = null;
            document.getElementById('prodFormTitle').textContent = 'Nuovo prodotto';
            document.getElementById('prodFormName').value = '';
            document.getElementById('prodFormQty').value = '';
            document.getElementById('prodFormMinStock').value = '';
            showView('productFormView');
            document.getElementById('prodFormName').focus();
        }

        function saveProduct() {
            const name = document.getElementById('prodFormName').value.trim();
            const qty = parseInt(document.getElementById('prodFormQty').value);
            const minStock = parseInt(document.getElementById('prodFormMinStock').value) || 1;
            
            if (!name || !qty) return;
            
            const coll = collections.find(c => c.id === selectedCollectionId);
            const sect = coll.sections.find(s => s.id === selectedSectionId);
            sect.products.push({ id: Date.now(), name, quantity: qty, minStock });
            
            renderProducts(selectedCollectionId, selectedSectionId);
            updateStats();
            saveData();
            showView('productsView');
        }

        function deleteProductConfirm(collId, sectId, prodId) {
            showConfirm('Eliminare questo prodotto?', () => {
                const coll = collections.find(c => c.id === collId);
                const sect = coll.sections.find(s => s.id === sectId);
                sect.products = sect.products.filter(p => p.id !== prodId);
                renderProducts(collId, sectId);
                updateStats();
                saveData();
                hideConfirm();
            });
        }

        function startEditProduct(collId, sectId, prodId) {
            const coll = collections.find(c => c.id === collId);
            const sect = coll.sections.find(s => s.id === sectId);
            const prod = sect.products.find(p => p.id === prodId);
            
            editingProductId = prodId;
            document.getElementById('editProdName').value = prod.name;
            document.getElementById('editProdMinStock').value = prod.minStock;
            showView('editProductView');
            document.getElementById('editProdName').focus();
        }

        function saveEditProduct() {
            const newName = document.getElementById('editProdName').value.trim();
            const newMinStock = parseInt(document.getElementById('editProdMinStock').value) || 1;
            
            if (!newName) return;
            
            const coll = collections.find(c => c.id === selectedCollectionId);
            const sect = coll.sections.find(s => s.id === selectedSectionId);
            const prod = sect.products.find(p => p.id === editingProductId);
            
            prod.name = newName;
            prod.minStock = newMinStock;
            
            renderProducts(selectedCollectionId, selectedSectionId);
            saveData();
            showView('productsView');
        }

        function increaseQty(collId, sectId, prodId, sectionName) {
            const coll = collections.find(c => c.id === collId);
            const sect = coll.sections.find(s => s.id === sectId);
            const prod = sect.products.find(p => p.id === prodId);
            prod.quantity++;
            
            const isLowStock = prod.quantity <= prod.minStock;
            logEvent(prod.name, sectionName, '+1', prod.quantity, isLowStock);
            
            renderProducts(collId, sectId);
            updateStats();
            saveData();
        }

        function decreaseQty(collId, sectId, prodId, sectionName) {
            const coll = collections.find(c => c.id === collId);
            const sect = coll.sections.find(s => s.id === sectId);
            const prod = sect.products.find(p => p.id === prodId);
            if (prod.quantity > 0) prod.quantity--;
            
            const isLowStock = prod.quantity <= prod.minStock;
            logEvent(prod.name, sectionName, '-1', prod.quantity, isLowStock);
            
            renderProducts(collId, sectId);
            updateStats();
            saveData();
        }

        function renderEventi() {
            const list = document.getElementById('eventsList');
            if (!events || events.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 20px; color: #888;">Nessun evento registrato</div>';
                return;
            }

            list.innerHTML = events.map(evt => {
                const isPlus = evt.operation === '+1';
                const isMinus = evt.operation === '-1';
                return `
                    <div class="event-item ${isPlus ? 'event-plus' : ''} ${isMinus ? 'event-minus' : ''} ${evt.isLowStock ? 'event-low-stock' : ''}">
                        <div class="event-header">
                            <div class="event-product">${evt.productName}</div>
                            <div class="event-time">${evt.time}</div>
                        </div>
                        <div style="font-size: 12px; color: #888; margin-bottom: 6px;">${evt.date}</div>
                        <div class="event-details">
                            <span class="event-section">${evt.sectionName}</span>
                            <span class="event-operation ${isPlus ? 'plus' : 'minus'}">${evt.operation}</span>
                            <span>Qtà: ${evt.quantity}</span>
                            ${evt.isLowStock ? '<span style="color: #ffa500;">⚠️ Sotto soglia</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Event Listeners
        document.getElementById('backBtn').addEventListener('click', () => {
            if (selectedSectionId) {
                selectedSectionId = null;
                renderSections(selectedCollectionId);
                showView('sectionsView');
            } else if (selectedCollectionId) {
                selectedCollectionId = null;
                showView('collectionsView');
            } else {
                showView('dashboardView');
            }
        });

        document.getElementById('manageBtn').addEventListener('click', () => {
            showView('collectionsView');
        });

        document.getElementById('registroBtn').addEventListener('click', () => {
            renderEventi();
            showView('registroView');
        });

        document.getElementById('backupBtn').addEventListener('click', () => {
            const backup = {
                collections: collections,
                events: events,
                exportDate: new Date().toISOString(),
                appVersion: 'V0.5'
            };
            const dataStr = JSON.stringify(backup, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `inventario_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const backup = JSON.parse(event.target.result);
                    
                    if (backup.collections && backup.events) {
                        collections = backup.collections;
                        events = backup.events;
                        
                        await saveData();
                        updateStats();
                        renderCollections();
                        
                        alert('✅ Backup caricato con successo!');
                    } else {
                        alert('❌ File non valido');
                    }
                } catch (error) {
                    alert('❌ Errore: ' + error.message);
                }
            };
            reader.readAsText(file);
        });

        document.getElementById('addCollBtn').addEventListener('click', startAddCollection);
        document.getElementById('collFormSubmit').addEventListener('click', saveCollection);
        document.getElementById('collFormCancel').addEventListener('click', () => showView('collectionsView'));
        document.getElementById('collFormInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveCollection();
        });

        document.getElementById('addSectBtn').addEventListener('click', startAddSection);
        document.getElementById('sectFormSubmit').addEventListener('click', saveSection);
        document.getElementById('sectFormCancel').addEventListener('click', () => showView('sectionsView'));
        document.getElementById('sectFormInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveSection();
        });

        document.getElementById('addProdBtn').addEventListener('click', startAddProduct);
        document.getElementById('prodFormSubmit').addEventListener('click', saveProduct);
        document.getElementById('prodFormCancel').addEventListener('click', () => showView('productsView'));

        document.getElementById('editProdSubmit').addEventListener('click', saveEditProduct);
        document.getElementById('editProdCancel').addEventListener('click', () => showView('productsView'));

        document.getElementById('confirmYes').addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
        });

        document.getElementById('confirmNo').addEventListener('click', hideConfirm);

        initDB();
    </script>
</body>
</html>
