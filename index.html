<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Inventario Furgone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1419; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
        header { padding: 16px; background: #0a0a0a; border-bottom: 1px solid #1e2532; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; display: none; }
        .back-btn.visible { display: block; }
        h1 { font-size: 20px; font-weight: bold; color: #fff; }
        .logout-btn { background: #cc2211; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; }
        main { padding: 16px; padding-bottom: 40px; }
        .view { display: none; }
        .view.active { display: block; }
        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; padding: 20px; }
        .login-title { font-size: 28px; font-weight: bold; color: #fff; }
        .google-btn { background: #fff; color: #0a0a0a; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .google-btn:active { opacity: 0.8; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-card:nth-child(1) .stat-number { color: #4a9eff; }
        .stat-card:nth-child(2) .stat-number { color: #ffa500; }
        .stat-card:nth-child(3) .stat-number { color: #00d084; }
        input { width: 100%; padding: 10px; background: #1a202c; border: 1px solid #2d3748; border-radius: 6px; color: #e0e0e0; font-size: 14px; margin-bottom: 8px; }
        button { border: none; border-radius: 6px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-primary { width: 100%; background: #4a9eff; color: #fff; margin-bottom: 16px; }
        .btn-add { width: 50px; height: 50px; background: #4a9eff; color: #fff; border-radius: 50%; padding: 0; font-size: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .btn-delete { background: #cc2211; color: #fff; padding: 6px 10px; font-size: 12px; }
        .btn-edit { background: #4a9eff; color: #fff; padding: 6px 10px; font-size: 12px; margin-right: 4px; }
        .btn-secondary { background: #333; color: #e0e0e0; width: 100%; margin-bottom: 8px; }
        .items-list { display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; }
        .item-clickable { flex: 1; cursor: pointer; }
        .item-name { color: #e0e0e0; font-weight: bold; }
        .item-count { font-size: 12px; color: #888; margin-top: 4px; }
        .item-actions { display: flex; gap: 4px; }
        .product-card { background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .product-card.low-stock { border-color: #ffa500; background: #2d2416; }
        .product-name { color: #e0e0e0; font-weight: bold; cursor: pointer; }
        .product-warning { font-size: 12px; color: #ffa500; margin-top: 4px; font-weight: bold; }
        .product-min-stock { font-size: 12px; color: #888; margin-top: 4px; }
        .qty-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .qty-btn { width: 50px; height: 50px; border-radius: 50%; border: none; color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn-minus { background: #ff4444; }
        .qty-btn-plus { background: #00d084; }
        .qty-display { font-size: 28px; font-weight: bold; color: #fff; min-width: 50px; text-align: center; }
        .breadcrumb { font-size: 12px; color: #888; margin-bottom: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; padding: 20px; max-width: 300px; width: 90%; }
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #fff; }
        .modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .modal-buttons button { flex: 1; margin: 0; }
        .btn-confirm { background: #00d084; color: #000; }
        .btn-cancel { background: #333; color: #e0e0e0; }
        .event-item { background: #1a202c; border: 1px solid #2d3748; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .event-item.event-plus { border-color: #00d084; background: #1a2d1f; }
        .event-item.event-minus { border-color: #ff4444; background: #2d1a1a; }
        .event-product { color: #e0e0e0; font-weight: bold; }
        .event-time { font-size: 12px; color: #888; }
        .event-operation.plus { color: #00d084; font-weight: bold; }
        .event-operation.minus { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loginView" class="view active">
        <div class="login-container">
            <div class="login-title">Inventario Furgone</div>
            <button class="google-btn" id="googleLoginBtn">🔐 Accedi con Google</button>
            <div id="loadingMsg" style="color: #888; font-size: 12px;"></div>
        </div>
    </div>

    <div id="appView" class="view">
        <header>
            <div class="header-left">
                <button class="back-btn" id="backBtn">←</button>
                <h1>Inventario Furgone</h1>
            </div>
            <button class="logout-btn" id="logoutBtn">Esci</button>
        </header>
        <main>
            <div id="dashboardView" class="view active">
                <div class="stats">
                    <div class="stat-card"><div class="stat-number" id="totalColls">0</div><div class="stat-label">Raccolte</div></div>
                    <div class="stat-card"><div class="stat-number" id="totalSects">0</div><div class="stat-label">Sezioni</div></div>
                    <div class="stat-card"><div class="stat-number" id="totalProds">0</div><div class="stat-label">Materiali</div></div>
                </div>
                <div id="alertContainer"></div>
                <button class="btn-primary" id="manageBtn">Gestisci Inventario</button>
                <button class="btn-primary" id="registroBtn" style="background: #666;">Registro Eventi</button>
                <button class="btn-primary" id="backupBtn" style="background: #555;">💾 Scarica Backup</button>
                <button class="btn-primary" id="uploadBtn" style="background: #444;">📤 Carica Backup</button>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>
            <div id="collectionsView" class="view"><div class="breadcrumb">Le tue raccolte</div><button class="btn-add" id="addCollBtn">+</button><div class="items-list" id="collectionsList"></div></div>
            <div id="collectionFormView" class="view"><div class="breadcrumb" id="collFormTitle">Nuova raccolta</div><input type="text" id="collFormInput" placeholder="Nome raccolta"><button class="btn-primary" id="collFormSubmit">Salva</button><button class="btn-secondary" id="collFormCancel">Annulla</button></div>
            <div id="sectionsView" class="view"><div class="breadcrumb" id="sectBreadcrumb"></div><button class="btn-add" id="addSectBtn">+</button><div class="items-list" id="sectionsList"></div></div>
            <div id="sectionFormView" class="view"><div class="breadcrumb" id="sectFormTitle">Nuova sezione</div><input type="text" id="sectFormInput" placeholder="Nome sezione"><button class="btn-primary" id="sectFormSubmit">Salva</button><button class="btn-secondary" id="sectFormCancel">Annulla</button></div>
            <div id="productsView" class="view"><div class="breadcrumb" id="prodBreadcrumb"></div><button class="btn-add" id="addProdBtn">+</button><div id="productsList"></div></div>
            <div id="productFormView" class="view"><div class="breadcrumb" id="prodFormTitle">Nuovo prodotto</div><input type="text" id="prodFormName" placeholder="Nome prodotto"><input type="number" id="prodFormQty" placeholder="Quantità"><input type="number" id="prodFormMinStock" placeholder="Soglia minima"><button class="btn-primary" id="prodFormSubmit">Salva</button><button class="btn-secondary" id="prodFormCancel">Annulla</button></div>
            <div id="editProductView" class="view"><div class="breadcrumb">Modifica prodotto</div><input type="text" id="editProdName" placeholder="Nome prodotto"><input type="number" id="editProdMinStock" placeholder="Soglia minima"><button class="btn-primary" id="editProdSubmit">Salva</button><button class="btn-secondary" id="editProdCancel">Annulla</button></div>
            <div id="lowStockView" class="view"><div class="breadcrumb">Prodotti quasi esauriti</div><div id="lowStockList"></div></div>
            <div id="registroView" class="view"><div class="breadcrumb">Registro Eventi</div><div id="eventsList"></div></div>
        </main>
    </div>

    <div id="confirmModal" class="modal"><div class="modal-content"><div class="modal-title" id="confirmMessage"></div><div class="modal-buttons"><button class="btn-confirm" id="confirmYes">Sì</button><button class="btn-cancel" id="confirmNo">No</button></div></div></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, orderBy, query, addDoc, setDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC-ye1cANsrRojmk4r4lhqEvrsXQpOyWjk",
            authDomain: "inventario-4ee6c.firebaseapp.com",
            projectId: "inventario-4ee6c",
            storageBucket: "inventario-4ee6c.firebasestorage.app",
            messagingSenderId: "805312307750",
            appId: "1:805312307750:web:1c74596187feed67a13ce7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let collections = [];
        let events = [];
        let selectedCollectionId = null;
        let selectedSectionId = null;
        let editingProductId = null;
        let editingCollectionId = null;
        let editingSectionId = null;
        let confirmCallback = null;

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginView').classList.remove('active');
                document.getElementById('appView').classList.add('active');
                loadData();
                initializeDataIfEmpty();
            } else {
                currentUser = null;
                document.getElementById('loginView').classList.add('active');
                document.getElementById('appView').classList.remove('active');
            }
        });

        async function initializeDataIfEmpty() {
            if (collections.length === 0) {
                collections = [
                    {
                        "id": 1,
                        "name": "Materiale Ksenia",
                        "sections": []
                    },
                    {
                        "id": 2,
                        "name": "Raccordi, Scatole, Tubi",
                        "sections": [
                            {
                                "id": 101,
                                "name": "Canale",
                                "products": [
                                    {
                                        "id": 1001,
                                        "name": "Canale 20x20",
                                        "quantity": 2,
                                        "minStock": 1
                                    },
                                    {
                                        "id": 1002,
                                        "name": "Canale 20x30",
                                        "quantity": 5,
                                        "minStock": 2
                                    }
                                ]
                            },
                            {
                                "id": 102,
                                "name": "Tubi",
                                "products": [
                                    {
                                        "id": 1003,
                                        "name": "Tubo 16mm",
                                        "quantity": 2,
                                        "minStock": 1
                                    }
                                ]
                            },
                            {
                                "id": 103,
                                "name": "Scatole",
                                "products": [
                                    {
                                        "id": 1004,
                                        "name": "Scatola 10x10",
                                        "quantity": 2,
                                        "minStock": 2
                                    },
                                    {
                                        "id": 1005,
                                        "name": "Scatola 10x15",
                                        "quantity": 2,
                                        "minStock": 1
                                    },
                                    {
                                        "id": 1006,
                                        "name": "Scatola Rotonda ø80",
                                        "quantity": 2,
                                        "minStock": 1
                                    }
                                ]
                            }
                        ]
                    }
                ];
                
                events = [
                    {
                        "id": 1773085340054,
                        "productName": "Scatola 10x10",
                        "sectionName": "Scatole",
                        "operation": "+1",
                        "quantity": 3,
                        "date": "09/03/2026",
                        "time": "20:42",
                        "isLowStock": false,
                        "timestamp": 1773085340041
                    },
                    {
                        "id": 1773085348961,
                        "productName": "Scatola 10x10",
                        "sectionName": "Scatole",
                        "operation": "-1",
                        "quantity": 2,
                        "date": "09/03/2026",
                        "time": "20:42",
                        "isLowStock": true,
                        "timestamp": 1773085348961
                    }
                ];
                
                await saveData();
                updateStats();
                renderCollections();
            }
        }

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            document.getElementById('loadingMsg').textContent = 'Caricamento...';
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                document.getElementById('loadingMsg').textContent = 'Errore: ' + error.message;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        function loadData() {
            // Carica da Firebase se ci sono dati
            const collRef = query(collection(db, 'users', currentUser.uid, 'collections'));
            onSnapshot(collRef, snapshot => {
                // Se Firebase ha dati, usali
                if (snapshot.size > 0) {
                    collections = [];
                    snapshot.forEach(doc => collections.push({ ...doc.data(), id: doc.id }));
                } else {
                    // Altrimenti usa i dati hardcoded
                    if (collections.length === 0) {
                        initializeDataIfEmpty();
                        return;
                    }
                }
                updateStats();
                renderCollections();
            });

            const eventsRef = query(collection(db, 'users', currentUser.uid, 'events'), orderBy('timestamp', 'desc'));
            onSnapshot(eventsRef, snapshot => {
                if (snapshot.size > 0) {
                    events = [];
                    snapshot.forEach(doc => events.push({ ...doc.data(), id: doc.id }));
                }
            });
        }

        async function logEvent(productName, sectionName, operation, quantity, isLowStock = false) {
            const now = new Date();
            await addDoc(collection(db, 'users', currentUser.uid, 'events'), {
                productName, sectionName, operation, quantity,
                date: now.toLocaleDateString('it-IT'),
                time: now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }),
                isLowStock, timestamp: now.getTime()
            });
        }

        async function saveData() {
            if (!currentUser) return;
            for (let coll of collections) {
                await setDoc(doc(db, 'users', currentUser.uid, 'collections', coll.id), coll);
            }
        }

        function showView(viewId) {
            document.querySelectorAll('#appView .view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('backBtn').classList.toggle('visible', viewId !== 'dashboardView');
        }

        function updateStats() {
            const colls = collections.length;
            const sects = collections.reduce((s, c) => s + (c.sections ? c.sections.length : 0), 0);
            const prods = collections.reduce((s, c) => s + (c.sections ? c.sections.reduce((ss, sec) => ss + (sec.products ? sec.products.length : 0), 0) : 0), 0);
            document.getElementById('totalColls').textContent = colls;
            document.getElementById('totalSects').textContent = sects;
            document.getElementById('totalProds').textContent = prods;
            renderAlert();
        }

        function renderAlert() {
            const lowStockProducts = [];
            collections.forEach(coll => {
                if (coll.sections) {
                    coll.sections.forEach(sect => {
                        if (sect.products) {
                            sect.products.forEach(prod => {
                                if (prod.quantity <= prod.minStock) {
                                    lowStockProducts.push({ ...prod, sectionName: sect.name, collectionName: coll.name });
                                }
                            });
                        }
                    });
                }
            });
            const container = document.getElementById('alertContainer');
            if (lowStockProducts.length > 0) {
                container.innerHTML = `<div class="alert-card" onclick="window.showLowStock()"><div style="font-size: 14px; font-weight: bold; color: #ffa500;">⚠️ ${lowStockProducts.length} prodotto${lowStockProducts.length > 1 ? 'i' : ''} quasi esaurito${lowStockProducts.length > 1 ? 'i' : ''}</div></div>`;
            } else {
                container.innerHTML = '';
            }
        }

        window.showLowStock = function() {
            const lowStockProducts = [];
            collections.forEach(coll => {
                if (coll.sections) {
                    coll.sections.forEach(sect => {
                        if (sect.products) {
                            sect.products.forEach(prod => {
                                if (prod.quantity <= prod.minStock) {
                                    lowStockProducts.push({ ...prod, sectionName: sect.name, collectionName: coll.name });
                                }
                            });
                        }
                    });
                }
            });
            const list = document.getElementById('lowStockList');
            list.innerHTML = lowStockProducts.map(prod => `<div class="product-card low-stock"><strong>${prod.name}</strong><div style="font-size: 12px; color: #888;">${prod.collectionName} › ${prod.sectionName}</div><div style="margin-top: 8px; font-size: 12px;">Qtà: <strong style="color: #ffa500;">${prod.quantity}</strong> | Soglia: ${prod.minStock}</div></div>`).join('');
            showView('lowStockView');
        };

        function renderCollections() {
            const list = document.getElementById('collectionsList');
            list.innerHTML = collections.map(coll => `<div class="item"><div class="item-clickable" onclick="window.selectCollection('${coll.id}')"><div class="item-name">${coll.name}</div><div class="item-count">${(coll.sections ? coll.sections.length : 0)} sezioni</div></div><div class="item-actions"><button class="btn-edit" onclick="window.startEditCollection('${coll.id}'); event.stopPropagation();">✏️</button><button class="btn-delete" onclick="window.deleteCollectionConfirm('${coll.id}'); event.stopPropagation();">✕</button></div></div>`).join('');
        }

        function renderSections(collId) {
            const coll = collections.find(c => c.id === collId);
            document.getElementById('sectBreadcrumb').textContent = coll.name;
            document.getElementById('sectionsList').innerHTML = (coll.sections || []).map(sect => `<div class="item"><div class="item-clickable" onclick="window.selectSection('${collId}', '${sect.id}')"><div class="item-name">${sect.name}</div><div class="item-count">${(sect.products ? sect.products.length : 0)} prodotti</div></div><div class="item-actions"><button class="btn-edit" onclick="window.startEditSection('${collId}', '${sect.id}'); event.stopPropagation();">✏️</button><button class="btn-delete" onclick="window.deleteSectionConfirm('${collId}', '${sect.id}'); event.stopPropagation();">✕</button></div></div>`).join('');
        }

        function renderProducts(collId, sectId) {
            const coll = collections.find(c => c.id === collId);
            const sect = coll.sections.find(s => s.id === sectId);
            document.getElementById('prodBreadcrumb').textContent = coll.name + ' › ' + sect.name;
            document.getElementById('productsList').innerHTML = (sect.products || []).map(prod => {
                const isLowStock = prod.quantity <= prod.minStock;
                return `<div class="product-card ${isLowStock ? 'low-stock' : ''}"><div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><div><div class="product-name" onclick="window.startEditProduct('${collId}', '${sectId}', '${prod.id}'); event.stopPropagation();">${prod.name}</div>${isLowStock ? '<div class="product-warning">⚠️ Quasi esaurito!</div>' : ''}<div class="product-min-stock" onclick="window.startEditProduct('${collId}', '${sectId}', '${prod.id}'); event.stopPropagation();">Soglia: ${prod.minStock}</div></div><button class="btn-delete" onclick="window.deleteProductConfirm('${collId}', '${sectId}', '${prod.id}')">✕</button></div><div class="qty-controls"><button class="qty-btn qty-btn-minus" onclick="window.decreaseQty('${collId}', '${sectId}', '${prod.id}', '${sect.name}')">−</button><div class="qty-display">${prod.quantity}</div><button class="qty-btn qty-btn-plus" onclick="window.increaseQty('${collId}', '${sectId}', '${prod.id}', '${sect.name}')">+</button></div></div>`;
            }).join('');
        }

        window.selectCollection = function(id) { selectedCollectionId = id; renderSections(id); showView('sectionsView'); };
        window.startEditCollection = function(id) { const coll = collections.find(c => c.id === id); editingCollectionId = id; document.getElementById('collFormTitle').textContent = 'Modifica raccolta'; document.getElementById('collFormInput').value = coll.name; showView('collectionFormView'); };
        window.selectSection = function(collId, sectId) { selectedCollectionId = collId; selectedSectionId = sectId; renderProducts(collId, sectId); showView('productsView'); };
        window.startEditSection = function(collId, sectId) { const coll = collections.find(c => c.id === collId); const sect = coll.sections.find(s => s.id === sectId); editingSectionId = sectId; document.getElementById('sectFormTitle').textContent = 'Modifica sezione'; document.getElementById('sectFormInput').value = sect.name; showView('sectionFormView'); };
        window.startEditProduct = function(collId, sectId, prodId) { const coll = collections.find(c => c.id === collId); const sect = coll.sections.find(s => s.id === sectId); const prod = sect.products.find(p => p.id === prodId); editingProductId = prodId; document.getElementById('editProdName').value = prod.name; document.getElementById('editProdMinStock').value = prod.minStock; showView('editProductView'); };
        window.deleteCollectionConfirm = function(id) { window.showConfirm('Eliminare questa raccolta?', async () => { await deleteDoc(doc(db, 'users', currentUser.uid, 'collections', id)); collections = collections.filter(c => c.id !== id); updateStats(); renderCollections(); window.hideConfirm(); }); };
        window.deleteSectionConfirm = function(collId, sectId) { window.showConfirm('Eliminare questa sezione?', async () => { const coll = collections.find(c => c.id === collId); coll.sections = coll.sections.filter(s => s.id !== sectId); await saveData(); renderSections(collId); window.hideConfirm(); }); };
        window.deleteProductConfirm = function(collId, sectId, prodId) { window.showConfirm('Eliminare questo prodotto?', async () => { const coll = collections.find(c => c.id === collId); const sect = coll.sections.find(s => s.id === sectId); sect.products = sect.products.filter(p => p.id !== prodId); await saveData(); renderProducts(collId, sectId); updateStats(); window.hideConfirm(); }); };
        window.increaseQty = async function(collId, sectId, prodId, sectionName) { const coll = collections.find(c => c.id === collId); const sect = coll.sections.find(s => s.id === sectId); const prod = sect.products.find(p => p.id === prodId); prod.quantity++; logEvent(prod.name, sectionName, '+1', prod.quantity, prod.quantity <= prod.minStock); await saveData(); renderProducts(collId, sectId); updateStats(); };
        window.decreaseQty = async function(collId, sectId, prodId, sectionName) { const coll = collections.find(c => c.id === collId); const sect = coll.sections.find(s => s.id === sectId); const prod = sect.products.find(p => p.id === prodId); if (prod.quantity > 0) prod.quantity--; logEvent(prod.name, sectionName, '-1', prod.quantity, prod.quantity <= prod.minStock); await saveData(); renderProducts(collId, sectId); updateStats(); };
        window.showConfirm = function(message, callback) { document.getElementById('confirmMessage').textContent = message; document.getElementById('confirmModal').classList.add('show'); confirmCallback = callback; };
        window.hideConfirm = function() { document.getElementById('confirmModal').classList.remove('show'); confirmCallback = null; };

        document.getElementById('backBtn').addEventListener('click', () => { if (selectedSectionId) { selectedSectionId = null; renderSections(selectedCollectionId); showView('sectionsView'); } else if (selectedCollectionId) { selectedCollectionId = null; showView('collectionsView'); } else { showView('dashboardView'); } });
        document.getElementById('manageBtn').addEventListener('click', () => showView('collectionsView'));
        document.getElementById('registroBtn').addEventListener('click', () => { const list = document.getElementById('eventsList'); list.innerHTML = events.length === 0 ? '<div style="text-align: center; padding: 20px; color: #888;">Nessun evento</div>' : events.map(evt => { const isPlus = evt.operation === '+1'; return `<div class="event-item ${isPlus ? 'event-plus' : 'event-minus'}"><div style="display: flex; justify-content: space-between; margin-bottom: 6px;"><div class="event-product">${evt.productName}</div><div class="event-time">${evt.time}</div></div><div style="font-size: 12px; color: #888; margin-bottom: 6px;">${evt.date}</div><div style="display: flex; gap: 8px; font-size: 13px; flex-wrap: wrap;"><span style="color: #4a9eff;">${evt.sectionName}</span><span class="event-operation ${isPlus ? 'plus' : 'minus'}">${evt.operation}</span><span>Qtà: ${evt.quantity}</span>${evt.isLowStock ? '<span style="color: #ffa500;">⚠️ Sotto soglia</span>' : ''}</div></div>`; }).join(''); showView('registroView'); });
        document.getElementById('backupBtn').addEventListener('click', () => {
            const backup = {
                collections: collections,
                events: events,
                exportDate: new Date().toISOString(),
                appVersion: 'V0.6'
            };
            const dataStr = JSON.stringify(backup, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `inventario_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const backup = JSON.parse(event.target.result);
                    
                    if (backup.collections && backup.events) {
                        collections = backup.collections;
                        events = backup.events;
                        
                        await saveData();
                        updateStats();
                        renderCollections();
                        
                        alert('✅ Backup caricato con successo!');
                    } else {
                        alert('❌ File non valido');
                    }
                } catch (error) {
                    alert('❌ Errore nel caricamento: ' + error.message);
                }
            };
            reader.readAsText(file);
        });
        document.getElementById('addCollBtn').addEventListener('click', () => { editingCollectionId = null; document.getElementById('collFormTitle').textContent = 'Nuova raccolta'; document.getElementById('collFormInput').value = ''; showView('collectionFormView'); });
        document.getElementById('collFormSubmit').addEventListener('click', async () => { const name = document.getElementById('collFormInput').value.trim(); if (!name) return; if (editingCollectionId) { const coll = collections.find(c => c.id === editingCollectionId); coll.name = name; } else { const newId = doc(collection(db, 'users', currentUser.uid, 'collections')).id; collections.push({ id: newId, name, sections: [] }); } await saveData(); showView('collectionsView'); });
        document.getElementById('collFormCancel').addEventListener('click', () => showView('collectionsView'));
        document.getElementById('addSectBtn').addEventListener('click', () => { editingSectionId = null; document.getElementById('sectFormTitle').textContent = 'Nuova sezione'; document.getElementById('sectFormInput').value = ''; showView('sectionFormView'); });
        document.getElementById('sectFormSubmit').addEventListener('click', async () => { const name = document.getElementById('sectFormInput').value.trim(); if (!name) return; const coll = collections.find(c => c.id === selectedCollectionId); if (editingSectionId) { const sect = coll.sections.find(s => s.id === editingSectionId); sect.name = name; } else { const newId = doc(collection(db, 'users', currentUser.uid, 'collections', selectedCollectionId, 'sections')).id; if (!coll.sections) coll.sections = []; coll.sections.push({ id: newId, name, products: [] }); } await saveData(); renderSections(selectedCollectionId); showView('sectionsView'); });
        document.getElementById('sectFormCancel').addEventListener('click', () => showView('sectionsView'));
        document.getElementById('addProdBtn').addEventListener('click', () => { editingProductId = null; document.getElementById('prodFormTitle').textContent = 'Nuovo prodotto'; document.getElementById('prodFormName').value = ''; document.getElementById('prodFormQty').value = ''; document.getElementById('prodFormMinStock').value = ''; showView('productFormView'); });
        document.getElementById('prodFormSubmit').addEventListener('click', async () => { const name = document.getElementById('prodFormName').value.trim(); const qty = parseInt(document.getElementById('prodFormQty').value); const minStock = parseInt(document.getElementById('prodFormMinStock').value) || 1; if (!name || !qty) return; const coll = collections.find(c => c.id === selectedCollectionId); const sect = coll.sections.find(s => s.id === selectedSectionId); const newId = doc(collection(db, 'users', currentUser.uid, 'collections', selectedCollectionId, 'sections', selectedSectionId, 'products')).id; if (!sect.products) sect.products = []; sect.products.push({ id: newId, name, quantity: qty, minStock }); await saveData(); renderProducts(selectedCollectionId, selectedSectionId); updateStats(); showView('productsView'); });
        document.getElementById('prodFormCancel').addEventListener('click', () => showView('productsView'));
        document.getElementById('editProdSubmit').addEventListener('click', async () => { const newName = document.getElementById('editProdName').value.trim(); const newMinStock = parseInt(document.getElementById('editProdMinStock').value) || 1; if (!newName) return; const coll = collections.find(c => c.id === selectedCollectionId); const sect = coll.sections.find(s => s.id === selectedSectionId); const prod = sect.products.find(p => p.id === editingProductId); prod.name = newName; prod.minStock = newMinStock; await saveData(); renderProducts(selectedCollectionId, selectedSectionId); showView('productsView'); });
        document.getElementById('editProdCancel').addEventListener('click', () => showView('productsView'));
        document.getElementById('confirmYes').addEventListener('click', () => { if (confirmCallback) confirmCallback(); });
        document.getElementById('confirmNo').addEventListener('click', () => window.hideConfirm());
    </script>
</body>
</html>
